version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nh_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # O Cloudflare Tunnel vai rotear evoapi.nacionalhidro.com.br -> localhost:3000
        - VITE_API_URL=${VITE_API_URL:-https://evoapi.nacionalhidro.com.br}
    container_name: nh_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
