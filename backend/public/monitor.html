<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacional Hidro | Sistema de Monitoramento</title>
    <meta name="description" content="Status e monitoramento em tempo real dos serviços e infraestrutura da Nacional Hidro.">
    <meta name="keywords" content="monitoramento, dashboard, status, nacional hidro">
    <meta property="og:title" content="Sistema de Monitoramento - Nacional Hidro">
    <meta property="og:description" content="Status e monitoramento em tempo real.">
    <meta property="og:image" content="https://prodnhidro.blob.core.windows.net/storage/logo.jpg">
    <meta property="og:type" content="website">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hacker-scroll::-webkit-scrollbar { width: 8px; }
        .hacker-scroll::-webkit-scrollbar-track { background: #1e293b; }
        .hacker-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen p-6">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="flex justify-between items-center bg-slate-800/50 p-6 rounded-2xl border border-slate-700 shadow-xl">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">Sistema de Monitoramento</h1>
                <p class="text-slate-400 text-sm mt-1">Backend V2.0.1 • Node.js <span id="node-version"></span> • <span id="platform"></span></p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-xs text-slate-500 uppercase tracking-widest font-bold">Uptime</p>
                    <p class="font-mono text-xl text-emerald-400" id="uptime">00:00:00</p>
                </div>
                <div class="h-10 w-px bg-slate-700"></div>
                <div class="flex items-center gap-2 px-4 py-2 bg-slate-900 rounded-lg border border-slate-700">
                    <div id="status-dot" class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span class="text-sm font-bold text-emerald-400" id="connection-status">ONLINE</span>
                </div>
            </div>
        </header>

        <!-- KPI Grid -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <!-- CPU -->
            <div class="glass p-6 rounded-2xl">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-xs text-slate-400 uppercase font-bold">Uso de CPU</p>
                        <h3 class="text-2xl font-bold mt-1" id="cpu-load">0%</h3>
                    </div>
                    <div class="p-2 bg-blue-500/10 rounded-lg text-blue-400">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" /></svg>
                    </div>
                </div>
                <div class="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden">
                    <div id="cpu-bar" class="bg-blue-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <!-- Memory -->
            <div class="glass p-6 rounded-2xl">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-xs text-slate-400 uppercase font-bold">Memória (Heap)</p>
                        <h3 class="text-2xl font-bold mt-1" id="memory-usage">0 MB</h3>
                    </div>
                    <div class="p-2 bg-cyan-500/10 rounded-lg text-cyan-400">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg>
                    </div>
                </div>
                <p class="text-xs text-slate-500 mt-2">Total System: <span id="mem-total">0 GB</span></p>
            </div>

            <!-- Database -->
            <div class="glass p-6 rounded-2xl border-l-4 border-l-emerald-500" id="db-card">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-xs text-slate-400 uppercase font-bold">Banco de Dados</p>
                        <h3 class="text-lg font-bold mt-1 text-emerald-400" id="db-status">CONECTADO</h3>
                    </div>
                    <div class="p-2 bg-emerald-500/10 rounded-lg text-emerald-400">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" /></svg>
                    </div>
                </div>
                <p class="text-xs text-slate-500 mt-2">Latência: <span id="db-latency" class="font-mono text-white">0ms</span> • PostgreSQL</p>
            </div>

            <!-- Requests -->
            <div class="glass p-6 rounded-2xl">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-xs text-slate-400 uppercase font-bold">Requisições (100)</p>
                        <h3 class="text-2xl font-bold mt-1" id="req-count">0</h3>
                    </div>
                    <div class="p-2 bg-amber-500/10 rounded-lg text-amber-400">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    </div>
                </div>
                 <p class="text-xs text-slate-500 mt-2">Média: <span id="avg-latency" class="font-mono text-white">0ms</span>/req</p>
            </div>
        </div>

        <!-- Main Content Split -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-[500px]">
            
            <!-- Real-time Chart -->
            <div class="lg:col-span-2 glass rounded-2xl p-6 flex flex-col">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" /></svg>
                    Tráfego de API (Requisições/s)
                </h3>
                <div class="flex-1 relative w-full h-full">
                    <canvas id="trafficChart"></canvas>
                </div>
            </div>

            <!-- Live Logs -->
            <div class="glass rounded-2xl flex flex-col overflow-hidden">
                <div class="p-4 bg-slate-900/50 border-b border-slate-700 flex justify-between items-center">
                    <h3 class="font-bold text-sm bg-slate-800 px-3 py-1 rounded-full text-blue-400 border border-slate-700">LIVE LOGS</h3>
                    <div class="flex gap-2">
                        <span class="w-2 h-2 rounded-full bg-red-500"></span>
                        <span class="w-2 h-2 rounded-full bg-yellow-500"></span>
                        <span class="w-2 h-2 rounded-full bg-green-500"></span>
                    </div>
                </div>
                <div id="logs-container" class="flex-1 overflow-y-auto p-4 space-y-2 hacker-scroll bg-slate-900 font-mono text-xs">
                    <!-- Logs will appear here -->
                    <div class="text-slate-500 text-center mt-10">Aguardando tráfego...</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const socket = io();
        
        // Element Refs
        const els = {
            uptime: document.getElementById('uptime'),
            cpuLoad: document.getElementById('cpu-load'),
            cpuBar: document.getElementById('cpu-bar'),
            memUsage: document.getElementById('memory-usage'),
            memTotal: document.getElementById('mem-total'),
            dbStatus: document.getElementById('db-status'),
            dbLatency: document.getElementById('db-latency'),
            dbCard: document.getElementById('db-card'),
            reqCount: document.getElementById('req-count'),
            avgLatency: document.getElementById('avg-latency'),
            logs: document.getElementById('logs-container'),
            platform: document.getElementById('platform')
        };

        // Chart Setup
        const ctx = document.getElementById('trafficChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [{
                    label: 'Latência (ms)',
                    data: [],
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { type: 'realtime', realtime: { delay: 2000 } },
                    y: { beginAtZero: true, grid: { color: '#334155' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // Utils
        const formatBytes = (bytes) => {
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            if (bytes === 0) return '0 Byte';
            const i = parseInt(Math.floor(Math.log(bytes) / Math.log(1024)));
            return Math.round(bytes / Math.pow(1024, i), 2) + ' ' + sizes[i];
        };

        const formatUptime = (seconds) => {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return `${h}h ${m}m`;
        };

        // Socket Events
        socket.on('stats', (data) => {
            // System
            els.uptime.innerText = formatUptime(data.system.uptime);
            els.platform.innerText = data.system.platform + ' ' + data.system.arch;
            
            // CPU (Mock load for demo if array)
            const load = data.system.cpu[0] || 0; 
            els.cpuLoad.innerText = load.toFixed(2) + '%';
            els.cpuBar.style.width = Math.min(load * 10, 100) + '%'; // Scale purely visual

            // Mem
            els.memUsage.innerText = formatBytes(data.system.memory.processHeap);
            els.memTotal.innerText = formatBytes(data.system.memory.total);

            // DB
            els.dbStatus.innerText = data.db.status.toUpperCase();
            els.dbLatency.innerText = data.db.latency + 'ms';
            if(data.db.status === 'connected') {
                els.dbCard.className = "glass p-6 rounded-2xl border-l-4 border-l-emerald-500";
                els.dbStatus.className = "text-lg font-bold mt-1 text-emerald-400";
            } else {
                els.dbCard.className = "glass p-6 rounded-2xl border-l-4 border-l-red-500";
                els.dbStatus.className = "text-lg font-bold mt-1 text-red-500 animate-pulse";
            }

            // Traffic
            els.reqCount.innerText = data.traffic.requests;
            els.avgLatency.innerText = Math.round(data.traffic.avgLatency) + 'ms';

            // Chart Update (Realtime)
            chart.data.datasets[0].data.push({
                x: Date.now(),
                y: data.traffic.avgLatency
            });
            // Keep chart clean
            if(chart.data.datasets[0].data.length > 50) chart.data.datasets[0].data.shift();
            chart.update('quiet');

            // Logs
            if (data.logs && data.logs.length > 0) {
                els.logs.innerHTML = data.logs.map(log => `
                    <div class="flex items-center gap-2 text-[10px] md:text-xs hover:bg-white/5 p-1 rounded transition-colors group border-l-2 ${log.status >= 400 ? 'border-red-500' : 'border-emerald-500'} pl-2">
                        <span class="text-slate-500 font-mono">${new Date(log.timestamp).toLocaleTimeString()}</span>
                        <span class="px-1.5 py-0.5 bg-slate-800 rounded text-slate-300 font-bold">${log.method}</span>
                        <span class="flex-1 text-slate-300 truncate group-hover:text-white transition-colors" title="${log.url}">${log.url}</span>
                        <span class="${log.status >= 400 ? 'text-red-400' : 'text-emerald-400'} font-bold">${log.status}</span>
                        <span class="text-slate-600 w-12 text-right">${log.duration}ms</span>
                    </div>
                `).join('');
            }
        });

    </script>
</body>
</html>
